<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Marketplace Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>API Marketplace Assistant</h1>
    <div class="controls">
      <label>
        User ID:
        <input id="userId" type="text" autocomplete="off" value="guest"
               placeholder="your user id" />
      </label>
      <button id="reset" type="button">Reset session</button>
    </div>
  </header>

  <main id="messages" aria-live="polite"></main>

  <form id="composer">
    <input id="input" type="text" autocomplete="off" placeholder="Ask about the API Marketplace — concepts, lifecycle, onboarding, consumption…" required />
    <button type="submit" id="send">Send</button>
  </form>

  <footer id="status">Ready.</footer>

  <script src="/static/chat.js"></script>
</body>
</html>
