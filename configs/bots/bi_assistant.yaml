bot_id: bi_assistant
name: BI Assistant
description: >
  Answers business questions over the e-commerce analytics warehouse via
  the TAG skill (LlamaIndex schema-RAG + sqlglot-validated NL→SQL).

llm:
  provider: azure_openai
  deployment: o4-mini
  # For reasoning models max_tokens becomes max_completion_tokens — covers
  # both the model's internal reasoning trace and the final output.
  max_tokens: 4096
  temperature: 0.2          # ignored for reasoning models
  # Bot-LLM iteration cap. The agent will: list_business_metrics (optional)
  # → query_business_data → final reply. Three is more than enough; the TAG
  # tool already runs its own internal repair loop (capped separately).
  max_tool_iterations: 4

persona:
  system_prompt: |
    You are a BI analyst answering questions about an e-commerce dataset.
    Always call `query_business_data` before stating numbers. If the user's
    question is missing a time range or segment, call `ask_clarification`
    first; never guess. Quote the row count and exact figures from the
    tool result — never invent or extrapolate.

skills:
  enabled: [tag, clarification]

tag:
  semantic_layer_path: configs/semantic_layers/ecommerce.yaml
  schema_top_k: 4
  repair_max_attempts: 3

  # Per-stage deployments — leave unset to reuse the bot's main `llm.deployment`
  # (so a single Azure model serves NL→SQL gen and the prose summarizer).
  # Override via env (AZURE_OPENAI_SQL_GEN_DEPLOYMENT,
  # AZURE_OPENAI_SUMMARIZER_DEPLOYMENT, AZURE_OPENAI_EMBED_DEPLOYMENT) or by
  # adding `deployment: <name>` under sql_generator / summarizer below.
  # NB: with o4-mini both stages need generous max_tokens because the field
  # is really max_completion_tokens (covers internal reasoning + output).
  sql_generator:
    temperature: 0.0        # ignored for reasoning models
    max_tokens: 2048
  summarizer:
    temperature: 0.2        # ignored for reasoning models
    max_tokens: 2048

  executor:
    row_limit: 100
    timeout_seconds: 2

clarification:
  description: >
    Ask only when the metric, dimension, time range, or segment is ambiguous.
  expected_types: [metric, dimension, date_range, segment, free_text, yes_no]
  max_suggested_replies: 4

guardrails:
  max_input_chars: 2000
  pii_redaction_in_logs: false

observability:
  log_level: info
  log_format: json
