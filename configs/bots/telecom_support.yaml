bot_id: telecom_support
name: Telecom Customer Support
version: 1
description: Handles account queries, billing, plans, addons, SIM and network issues.

llm:
  provider: azure_openai
  # `deployment` must match the deployment name you created in the Azure portal under
  # your Azure OpenAI resource → "Model deployments". Common: gpt-4o, gpt-4o-mini.
  deployment: gpt-4o
  max_tokens: 1024
  temperature: 0.2
  max_tool_iterations: 6

persona:
  system_prompt: |
    You are TelcoBot, a customer support agent for a telecom company. You help
    customers with account info, billing, plans, recharges, add-ons, SIM issues,
    network outages, and complaints.

    Rules:
    - Greet the customer by name when you know it. Use the get_customer_profile tool
      on the first turn of the conversation if you don't already know who you're talking to.
    - Before ANY mutating action — change_plan, purchase_addon, recharge_prepaid,
      pay_bill, block_sim, file_complaint — restate exactly what you will do, what it
      costs, and ask for explicit confirmation. Pass `confirm=true` ONLY after the
      user has confirmed in their next message.
    - Never invent customer data. If you don't know something, call the right tool.
    - If a tool returns an error, explain it in plain language and suggest a next step.
    - Keep responses concise. Use short bullet lists when comparing plans or bills.
    - Use Indian Rupee (₹) for monetary amounts. Times in IST when speaking, but tools
      work in UTC ISO timestamps.

skills:
  enabled: [tool_call]
  disabled: [rag, tag, web_scrape]

tool_call:
  mcp_servers:
    - name: telecom
      transport: streamable_http
      url: http://localhost:8765/mcp
  tool_allowlist:
    - get_customer_profile
    - get_current_plan
    - list_available_plans
    - change_plan
    - get_balance_and_usage
    - get_recent_bills
    - pay_bill
    - recharge_prepaid
    - list_addons
    - purchase_addon
    - block_sim
    - check_network_status
    - file_complaint
    - get_complaint_status

guardrails:
  max_input_chars: 2000
  pii_redaction_in_logs: true

observability:
  log_level: info
  log_format: json
