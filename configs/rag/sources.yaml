# Declarative source connectors. The rag_api scheduler reads this on startup
# and schedules each entry that has a `schedule.cron`. A scheduled fire
# enqueues an ingestion job through the same JobQueue the REST API uses —
# so behavior is identical to a manual `POST /ingest`.
#
# Sources without a `schedule` are not scheduled — they're recorded as
# documentation / one-shot reference.

sources:
  # Local-filesystem ingestion of the seeded telecom policy corpus. Fires
  # every 15 minutes so edits to the .md files propagate without a restart.
  - name: telecom_policies_local
    tenant: telecom_demo
    collection: telecom_policies
    connector: file_loader
    config:
      path: ./data/rag_corpus/telecom_policies
      glob: "**/*.md"
    schedule:
      cron: "*/15 * * * *"
    metadata:
      owner: support_ops
      review_cadence: quarterly

  # Example Confluence sync — disabled by default (no `schedule`) until
  # CONFLUENCE_BASE_URL / CONFLUENCE_USER_EMAIL / CONFLUENCE_API_TOKEN are
  # set. Uncomment `schedule.cron` to enable.
  - name: telecom_kb_confluence
    tenant: telecom_demo
    collection: telecom_policies
    connector: confluence
    config:
      base_url: ${CONFLUENCE_BASE_URL}
      space_key: TELCO
    # schedule:
    #   cron: "0 */6 * * *"
    metadata:
      owner: support_ops

  # Example Notion sync — same disabled-by-default pattern.
  - name: telecom_kb_notion
    tenant: telecom_demo
    collection: telecom_policies
    connector: notion
    config:
      database_id: ${NOTION_DATABASE_ID}
    # schedule:
    #   cron: "0 */6 * * *"
